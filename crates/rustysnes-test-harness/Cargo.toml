[package]
name = "rustysnes-test-harness"
version = "1.0.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true

[features]
default = []
test-roms = []          # compiles the committed CC0/public-domain suites + integration tests
commercial-roms = []    # the local-dump oracle (ROMs gitignored; commit only screenshots/.snap)

[dependencies]
rustysnes-core = { path = "../rustysnes-core", version = "1.0.1" }

[dev-dependencies]
insta = "1"
serde_json = "1"
rustysnes-cpu = { path = "../rustysnes-cpu", version = "1.0.1" }
rustysnes-apu = { path = "../rustysnes-apu", version = "1.0.1" }
rustysnes-savestate = { path = "../rustysnes-savestate", version = "1.0.1" }

[lints]
workspace = true
