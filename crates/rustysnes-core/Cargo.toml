[package]
name = "rustysnes-core"
version = "0.7.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true

[features]
default = ["std"]
std = []

[dependencies]
rustysnes-cpu = { path = "../rustysnes-cpu", version = "0.7.0", default-features = false }
rustysnes-ppu = { path = "../rustysnes-ppu", version = "0.7.0", default-features = false }
rustysnes-apu = { path = "../rustysnes-apu", version = "0.7.0", default-features = false }
rustysnes-cart = { path = "../rustysnes-cart", version = "0.7.0", default-features = false }
rustysnes-savestate = { path = "../rustysnes-savestate", version = "0.7.0" }

[dev-dependencies]
criterion = "0.7"

[[bench]]
name = "headless_frame"
harness = false

[lints]
workspace = true
