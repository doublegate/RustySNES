# Minimal 32 KiB LoROM linker config for the $213E over-flag probe ROM.
MEMORY {
    ZP:    start = $000000, size = $0100, type = rw, define = yes;
    RAM:   start = $000100, size = $1F00, type = rw, define = yes;
    ROM0:  start = $008000, size = $7FC0, type = ro, fill = yes, fillval = $FF, file = %O;
    HDR:   start = $00FFC0, size = $0020, type = ro, fill = yes, fillval = $00, file = %O;
    VEC:   start = $00FFE0, size = $0020, type = ro, fill = yes, fillval = $00, file = %O;
}
SEGMENTS {
    ZEROPAGE: load = ZP,  type = zp,  optional = yes;
    CODE:     load = ROM0, type = ro,  start = $008000;
    HEADER:   load = HDR,  type = ro;
    VECTORS:  load = VEC,  type = ro;
}
