# AccuracySNES — ld65 linker configuration (ExHiROM, ~4.06 MiB, ROM-only, no SRAM).
#
# The third image: it exists only to self-score the ExHiROM A23->A22 half-selection (G1.16). Unlike
# HiROM, ExHiROM inverts address bit 23 into ROM offset bit 22, so:
#   banks $80-$FF (A23=1) -> the FIRST 4 MiB  (ROM $000000-$3FFFFF)
#   banks $00-$7D (A23=0) -> the EXTRA 4 MiB  (ROM $400000-$7FFFFF)
# (see `crates/rustysnes-cart/src/board.rs` ExHiRom::map). The header lives at file $40FFC0.
#
# CONSEQUENCE FOR THE RUNTIME: bank $00 has A23=0, so $00:8000-$FFFF maps into the SECOND half
# ($408000+). The runtime therefore links at CPU $00:8000 (where $21xx/$42xx still decode as MMIO)
# but its bytes sit at FILE offset $408000. The reset vector at $00:FFFC reads ROM $40FFFC.
#
# The image must genuinely exceed 4 MiB so the two halves are distinct physical bytes (a smaller
# image would mirror $408000 back onto $008000 and the halves would be indistinguishable — which is
# the whole thing G1.16 checks). So it spans ROM $000000-$40FFFF = $410000 bytes; the gap between the
# small first-half signature and $400000 is $FF fill (which git compresses to ~KB).
#
# ld65 writes `file = %O` MEMORY regions in DECLARATION order: LOWHALF fills file $000000-$3FFFFF,
# then SECONDLOW/ROM0/HDR/VEC fill $400000-$40FFFF.

MEMORY {
    ZP:      start = $000000, size = $0100,   type = rw, define = yes;
    LORAM:   start = $000100, size = $1F00,   type = rw, define = yes;

    # First 4 MiB (ROM $000000-$3FFFFF), reached via the $C0-$FF linear banks.
    LOWHALF: start = $C00000, size = $400000, type = ro, fill = yes, fillval = $FF, file = %O;

    # Second half, lower part ($40:0000-$7FFF = ROM $400000-$407FFF), reached via $40 linear.
    SECONDLOW: start = $400000, size = $8000, type = ro, fill = yes, fillval = $FF, file = %O;

    # The runtime, in the $00:8000-$FFFF window (= ROM $408000-$40FFFF under ExHiROM's high-bit rule).
    ROM0:    start = $008000, size = $7FB0,   type = ro, fill = yes, fillval = $FF, file = %O;
    HDR:     start = $00FFB0, size = $0030,   type = ro, fill = yes, fillval = $00, file = %O;
    VEC:     start = $00FFE0, size = $0020,   type = ro, fill = yes, fillval = $00, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,       type = zp,  optional = yes;
    BSS:      load = LORAM,    type = bss, optional = yes;

    # First-half landmark at ROM $000000 (read via $C0:0000 / $80:8000), then font + test bodies.
    EXSIG_LO: load = LOWHALF,  type = ro,  start = $C00000;
    FONT:     load = LOWHALF,  type = ro,  optional = yes;
    TESTSG:   load = LOWHALF,  type = ro,  optional = yes;
    TESTSE:   load = LOWHALF,  type = ro,  optional = yes;
    TESTSC:   load = LOWHALF,  type = ro,  optional = yes;
    TESTSD:   load = LOWHALF,  type = ro,  optional = yes;

    # Second-half landmark at ROM $400000 (read via $40:0000). A different byte than EXSIG_LO.
    EXSIG_HI: load = SECONDLOW, type = ro, start = $400000;

    # Runtime in the $00 window. SIG0 first (harmless; no A4 test reads it in this battery).
    SIG0:     load = ROM0,     type = ro,  start = $008000;
    CODE:     load = ROM0,     type = ro;
    RUNTIME:  load = ROM0,     type = ro,  optional = yes;
    RODATA:   load = ROM0,     type = ro,  optional = yes;
    CATALOG:  load = ROM0,     type = ro,  optional = yes;
    TESTS:    load = ROM0,     type = ro,  optional = yes;

    HEADER:   load = HDR,      type = ro;
    VECTORS:  load = VEC,      type = ro;
}
