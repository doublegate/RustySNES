# AccuracySNES — ld65 linker configuration (LoROM, 128 KiB, no SRAM, no coprocessor)
#
# 128 KiB rather than the minimum 32 KiB for one specific reason: several 65816 addressing
# tests must distinguish "the effective address wrapped within bank $00" from "it crossed into
# bank $01". Inside a 32 KiB image every bank mirrors the same data, so the two outcomes are
# indistinguishable and the test proves nothing. With four distinct 32 KiB LoROM banks, each
# carries its own signature byte and the difference is observable.
#
# LoROM maps bank $xx:$8000-$FFFF -> ROM offset (xx << 15). So:
#   bank $00 -> file $000000-$007FFF   (runtime, header, vectors, catalog)
#   bank $01 -> file $008000-$00FFFF   (signature table + APU sample data + font)
#   bank $02 -> file $010000-$017FFF
#   bank $03 -> file $018000-$01FFFF
#   banks $04-$07                      (256 KiB image; headroom, see below)
#
# The image is 256 KiB (8 banks), grown from 128 KiB. The reason is NOT total space -- at the time
# of the change bank $03 was two-thirds empty. It is that **a segment cannot span a bank boundary**
# in LoROM, so each group's test bodies must fit in one 32 KiB bank, and `TESTSE` was already 19 KiB
# with Group E holding by far the most uncovered dossier rows. Growing gives a group somewhere to
# split *into* when it outgrows a bank.
#
# Note what growing does not fix: **bank $00 is 32 KiB whatever the cart size**, because LoROM maps
# only $8000-$FFFF of it and the vectors, header and everything the runtime reaches with a
# bank-local `jsr` must live there. Bank $00 pressure is relieved by moving bodies out (see
# `emit.rs`'s OUT_OF_BANK), never by a bigger image.
#
# Sizes matter: ROM0 must stop at $FFBF so HDR lands exactly at $FFC0 and VEC at $FFE0.
# This shape was validated by assembling and linking a probe ROM before it was committed.

MEMORY {
    # --- RAM (addresses only; nothing is written to the output file) ---
    ZP:     start = $000000, size = $0100, type = rw, define = yes;
    LORAM:  start = $000100, size = $1F00, type = rw, define = yes;

    # --- Bank $00 ---
    # $7FB0 + $30 + $20 = $8000 exactly. The header MEMORY area starts at $FFB0, not $FFC0,
    # so it covers the extended header ($FFB0-$FFBF) as well as the core one ($FFC0-$FFDF) —
    # otherwise 16 bytes go unallocated and the image comes out short.
    ROM0:   start = $008000, size = $7FB0, type = ro, fill = yes, fillval = $FF, file = %O;
    HDR:    start = $00FFB0, size = $0030, type = ro, fill = yes, fillval = $00, file = %O;
    VEC:    start = $00FFE0, size = $0020, type = ro, fill = yes, fillval = $00, file = %O;

    # --- Banks $01-$03 ---
    ROM1:   start = $018000, size = $8000, type = ro, fill = yes, fillval = $FF, file = %O;
    ROM2:   start = $028000, size = $8000, type = ro, fill = yes, fillval = $FF, file = %O;
    ROM3:   start = $038000, size = $8000, type = ro, fill = yes, fillval = $FF, file = %O;

    # --- Banks $04-$07 ---
    # Declared and filled so the image is a standard 256 KiB even while they are empty: the header's
    # size byte says 256 KiB and an image shorter than its header claims is a malformed cartridge.
    ROM4:   start = $048000, size = $8000, type = ro, fill = yes, fillval = $FF, file = %O;
    ROM5:   start = $058000, size = $8000, type = ro, fill = yes, fillval = $FF, file = %O;
    ROM6:   start = $068000, size = $8000, type = ro, fill = yes, fillval = $FF, file = %O;
    ROM7:   start = $078000, size = $8000, type = ro, fill = yes, fillval = $FF, file = %O;
}

SEGMENTS {
    # Zero page / scratch. Nothing here reaches the file.
    ZEROPAGE: load = ZP,    type = zp,  optional = yes;
    BSS:      load = LORAM, type = bss, optional = yes;

    # Bank $00: signature block first (so every bank has one at $xx:8000), then code.
    SIG0:     load = ROM0,  type = ro,  start = $008000;
    CODE:     load = ROM0,  type = ro;
    RUNTIME:  load = ROM0,  type = ro,  optional = yes;
    TESTS:    load = ROM0,  type = ro,  optional = yes;
    # The catalog moved out of bank $00 once it was the last thing there that could move: it grows
    # by about 27 bytes per test and bank $00 cannot grow at all. Every access to it is already
    # long-addressed; what had to change was draw_str, which read name strings through DBR.
    CATALOG:  load = ROM4,  type = ro,  optional = yes;
    RODATA:   load = ROM0,  type = ro,  optional = yes;

    # The cartridge header and the two vector tables.
    HEADER:   load = HDR,   type = ro;
    VECTORS:  load = VEC,   type = ro;

    # Per-bank signature bytes, so bank-crossing tests have something to observe.
    BANK1:    load = ROM1,  type = ro,  start = $018000, optional = yes;

    # Out-of-bank read-only data (the SPC700 program images). Bank $00 holds the runtime, every
    # test body and the catalog; the APU images are pure data read through a 24-bit pointer, so
    # they are the natural thing to move out when that bank fills up.
    #
    # They now have a bank to themselves. They grow at roughly 240 bytes per APU test and Group E
    # holds the most uncovered rows left, so this is the second segment after TESTSE that a single
    # bank will not hold forever.
    APUDATA:  load = ROM6,  type = ro,  optional = yes;

    # The font, out of bank $00 for the same reason: pure data, and the runtime already reads it
    # with long addressing (`lda f:font_data,x`). Declared AFTER BANK1 because ld65 fills a memory
    # area in declaration order, and BANK1 has a fixed start at the very bottom of it.
    FONT:     load = ROM1,  type = ro,  optional = yes;
    BANK2:    load = ROM2,  type = ro,  start = $028000, optional = yes;

    # Group E's test bodies. Bank $00 holds the runtime, the catalog and every other test body;
    # the dispatch table is 24-bit so a body may live anywhere, and group E is the group both
    # largest and still growing. Declared after BANK2 for the same declaration-order reason as
    # APUDATA and FONT.
    #
    # It has a bank to itself: it is the largest segment and holds the most uncovered rows, so it
    # is the one that will need splitting first. Giving it room now is cheaper than moving it
    # later.
    TESTSE:   load = ROM2,  type = ro,  optional = yes;
    BANK3:    load = ROM3,  type = ro,  start = $038000, optional = yes;

    # Groups G and F's test bodies, in bank $03, for the same reason group E is in bank $02: bank
    # $00 overflowed again. G and F are the groups that move cleanly -- B, C and D reach the runtime
    # with a bank-local `jsr` and would need `jsl` entry points first. Declared after BANK3 for the
    # same declaration-order reason as the others.
    TESTSG:   load = ROM3,  type = ro,  optional = yes;

    # Group C's test bodies. Bank $00 overflowed a fourth time; C is the largest remaining group
    # and became movable once the runtime grew `_far` wrappers for the helpers its bodies call.
    TESTSC:   load = ROM3,  type = ro,  optional = yes;
    TESTSD:   load = ROM5,  type = ro,  optional = yes;
}
