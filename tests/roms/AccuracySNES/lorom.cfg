# AccuracySNES — ld65 linker configuration (LoROM, 128 KiB, no SRAM, no coprocessor)
#
# 128 KiB rather than the minimum 32 KiB for one specific reason: several 65816 addressing
# tests must distinguish "the effective address wrapped within bank $00" from "it crossed into
# bank $01". Inside a 32 KiB image every bank mirrors the same data, so the two outcomes are
# indistinguishable and the test proves nothing. With four distinct 32 KiB LoROM banks, each
# carries its own signature byte and the difference is observable.
#
# LoROM maps bank $xx:$8000-$FFFF -> ROM offset (xx << 15). So:
#   bank $00 -> file $000000-$007FFF   (runtime, header, vectors, group A tests)
#   bank $01 -> file $008000-$00FFFF   (signature table + spill)
#   bank $02 -> file $010000-$017FFF
#   bank $03 -> file $018000-$01FFFF
#
# Sizes matter: ROM0 must stop at $FFBF so HDR lands exactly at $FFC0 and VEC at $FFE0.
# This shape was validated by assembling and linking a probe ROM before it was committed.

MEMORY {
    # --- RAM (addresses only; nothing is written to the output file) ---
    ZP:     start = $000000, size = $0100, type = rw, define = yes;
    LORAM:  start = $000100, size = $1F00, type = rw, define = yes;

    # --- Bank $00 ---
    # $7FB0 + $30 + $20 = $8000 exactly. The header MEMORY area starts at $FFB0, not $FFC0,
    # so it covers the extended header ($FFB0-$FFBF) as well as the core one ($FFC0-$FFDF) —
    # otherwise 16 bytes go unallocated and the image comes out short.
    ROM0:   start = $008000, size = $7FB0, type = ro, fill = yes, fillval = $FF, file = %O;
    HDR:    start = $00FFB0, size = $0030, type = ro, fill = yes, fillval = $00, file = %O;
    VEC:    start = $00FFE0, size = $0020, type = ro, fill = yes, fillval = $00, file = %O;

    # --- Banks $01-$03 ---
    ROM1:   start = $018000, size = $8000, type = ro, fill = yes, fillval = $FF, file = %O;
    ROM2:   start = $028000, size = $8000, type = ro, fill = yes, fillval = $FF, file = %O;
    ROM3:   start = $038000, size = $8000, type = ro, fill = yes, fillval = $FF, file = %O;
}

SEGMENTS {
    # Zero page / scratch. Nothing here reaches the file.
    ZEROPAGE: load = ZP,    type = zp,  optional = yes;
    BSS:      load = LORAM, type = bss, optional = yes;

    # Bank $00: signature block first (so every bank has one at $xx:8000), then code.
    SIG0:     load = ROM0,  type = ro,  start = $008000;
    CODE:     load = ROM0,  type = ro;
    RUNTIME:  load = ROM0,  type = ro,  optional = yes;
    FONT:     load = ROM0,  type = ro,  optional = yes;
    TESTS:    load = ROM0,  type = ro,  optional = yes;
    CATALOG:  load = ROM0,  type = ro,  optional = yes;
    RODATA:   load = ROM0,  type = ro,  optional = yes;

    # The cartridge header and the two vector tables.
    HEADER:   load = HDR,   type = ro;
    VECTORS:  load = VEC,   type = ro;

    # Per-bank signature bytes, so bank-crossing tests have something to observe.
    BANK1:    load = ROM1,  type = ro,  start = $018000, optional = yes;

    # Out-of-bank read-only data (the SPC700 program images). Bank $00 holds the runtime, the
    # font, every test body and the catalog; the APU images are pure data read through a 24-bit
    # pointer, so they are the natural thing to move out when that bank fills up.
    APUDATA:  load = ROM1,  type = ro,  optional = yes;
    BANK2:    load = ROM2,  type = ro,  start = $028000, optional = yes;
    BANK3:    load = ROM3,  type = ro,  start = $038000, optional = yes;
}
