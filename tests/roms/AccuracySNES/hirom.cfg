# AccuracySNES — ld65 linker configuration (HiROM, 64 KiB, 8 KiB battery SRAM).
#
# The parallel minimal HiROM image. It shares `runtime.s` (assembled with -D HIROM_BUILD so the
# LoROM-only per-bank signature blocks are dropped) and `font.s`, plus its own tiny battery of
# HiROM/SRAM tests. Its whole purpose is to be self-scored under HiROM decode so G1.15/G1.17 can
# assert the emulator's HiROM board and SRAM window on-cart.
#
# HiROM maps:
#   $C0-$FF:$0000-$FFFF -> ROM offset linearly ($C0:0000 = ROM $000000).
#   $00-$3F:$8000-$FFFF -> the SAME ROM as $C0-$FF:$8000-$FFFF (the upper-half window).
#   $20-$3F:$6000-$7FFF -> battery SRAM.
#
# So a 64 KiB image lays out as:
#   file $0000-$7FFF  = ROM $0000-$7FFF, reachable via $C0:0000-$7FFF (linear low half).
#   file $8000-$FFFF  = ROM $8000-$FFFF, reachable via BOTH $00:8000-$FFFF (window) AND
#                       $C0:8000-$FFFF (linear) — which is exactly what G1.15 reads both ways.
#
# THE LOAD-BEARING CONSTRAINT: the runtime MUST live in the $00:8000-$FFFF window. `phk/plb` at reset
# sets DBR to the running bank, and MMIO ($21xx/$42xx) only decodes in banks $00-$3F/$80-$BF — in
# $C0-$FF those addresses are ROM. A runtime in $C0 would send every `sta $2100` into ROM and the
# cart would silently never initialise. So ROM0 (the runtime) is addressed at $00:8000; only pure,
# long-addressed data and position-independent test bodies go in the $C0 linear half.
#
# ld65 writes `file = %O` MEMORY regions in DECLARATION order, so LOWROM (declared first) fills file
# $0000-$7FFF and ROM0/HDR/VEC fill $8000-$FFFF. CPU `start` addresses only fix symbol resolution.

MEMORY {
    # --- RAM (addresses only; nothing is written to the output file) ---
    ZP:     start = $000000, size = $0100, type = rw, define = yes;
    LORAM:  start = $000100, size = $1F00, type = rw, define = yes;

    # --- File $0000-$7FFF: ROM lower half, reached via the $C0 linear banks ---
    # Font and the position-independent test bodies live here (all long-addressed / dispatched
    # through the 24-bit _test_entries table), leaving the whole $00 window for the runtime.
    LOWROM: start = $C00000, size = $8000, type = ro, fill = yes, fillval = $FF, file = %O;

    # --- File $8000-$FFFF: ROM upper half = the $00:8000-$FFFF window (runtime) ---
    # $7FB0 + $30 + $20 = $8000 exactly; ROM0 stops at $FFAF so HDR lands at $FFB0 and VEC at $FFE0.
    ROM0:   start = $008000, size = $7FB0, type = ro, fill = yes, fillval = $FF, file = %O;
    HDR:    start = $00FFB0, size = $0030, type = ro, fill = yes, fillval = $00, file = %O;
    VEC:    start = $00FFE0, size = $0020, type = ro, fill = yes, fillval = $00, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,     type = zp,  optional = yes;
    BSS:      load = LORAM,  type = bss, optional = yes;

    # Runtime in the $00 window. SIG0 first (harmless here; no A4 test reads it in this battery).
    SIG0:     load = ROM0,   type = ro,  start = $008000;
    CODE:     load = ROM0,   type = ro;
    RUNTIME:  load = ROM0,   type = ro,  optional = yes;
    RODATA:   load = ROM0,   type = ro,  optional = yes;
    CATALOG:  load = ROM0,   type = ro,  optional = yes;
    TESTS:    load = ROM0,   type = ro,  optional = yes;

    # The cartridge header and the two vector tables.
    HEADER:   load = HDR,    type = ro;
    VECTORS:  load = VEC,    type = ro;

    # Font and the HiROM test bodies in the $C0 linear half. Group G/F bodies are position-independent
    # (long addressing + the 24-bit dispatch), so they run correctly with PBR = $C0.
    FONT:     load = LOWROM, type = ro,  optional = yes;
    TESTSG:   load = LOWROM, type = ro,  optional = yes;
    TESTSE:   load = LOWROM, type = ro,  optional = yes;
    TESTSC:   load = LOWROM, type = ro,  optional = yes;
    TESTSD:   load = LOWROM, type = ro,  optional = yes;
}
