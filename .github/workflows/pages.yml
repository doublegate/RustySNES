name: Deploy Pages (demo + docs)
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
# Only the latest main push's deploy matters — a superseded run doing a wasted rebuild+deploy of
# an already-stale commit is pure cost with no benefit (deploy-pages itself also serializes on the
# `github-pages` environment, so a cancelled stale run couldn't have raced a newer deploy anyway).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      # Build the wasm demo (trunk) at / and the rustdoc at /api/, then deploy ONE artifact.
      # GOTCHA: keep crates/rustysnes-frontend/web/Trunk.toml's wasm-bindgen pin == Cargo.lock library version.
      - uses: ./.github/actions/rust-setup
        with:
          targets: wasm32-unknown-unknown
          linux-frontend-deps: "true"
      # Prebuilt binary download instead of `cargo install trunk --locked` (which compiled trunk
      # + its whole dependency tree from source on every single run — minutes of pure setup cost
      # for a tool whose own source never changes here).
      - name: Install trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Build wasm demo
        # No RUSTFLAGS override: `-C target-feature=-reference-types` (previously here) broke
        # wasm-bindgen's externref table generation ("failed to find the
        # `__wbindgen_externref_table_dealloc` function") once the demo actually linked in real
        # `Closure`-based code (T-81-005) — it had been a silent no-op until now because the
        # wasm artifact this workflow built was, until this fix, an empty ~14 KB stub (see
        # `web/index.html`'s `data-target-name` comment for why).
        run: trunk build --release --public-url /RustySNES/
        working-directory: crates/rustysnes-frontend/web
      - name: Build rustdoc
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps
      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p _site/api
          cp -r crates/rustysnes-frontend/web/dist/. _site/
          cp -r target/doc/. _site/api/
          # rustdoc emits no root index for a multi-crate workspace (`cargo doc --workspace`
          # writes one directory per crate, no top-level index.html) — without this, /api/
          # itself 404s even though e.g. /api/rustysnes_core/index.html works fine. Redirect to
          # the main library facade so /api/ lands somewhere useful, mirroring RustyNES's
          # pattern (`../RustyNES/.github/workflows/web.yml`).
          cat > _site/api/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=rustysnes_core/index.html">
          <title>RustySNES API documentation</title>
          <a href="rustysnes_core/index.html">RustySNES API documentation</a>
          HTML
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
