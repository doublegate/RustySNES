name: Deploy Pages (demo + docs)
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
# Only the latest main push's deploy matters — a superseded run doing a wasted rebuild+deploy of
# an already-stale commit is pure cost with no benefit (deploy-pages itself also serializes on the
# `github-pages` environment, so a cancelled stale run couldn't have raced a newer deploy anyway).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      # Build the wasm demo (trunk) at / and the rustdoc at /api/, then deploy ONE artifact.
      # GOTCHA: keep crates/rustysnes-frontend/web/Trunk.toml's wasm-bindgen pin == Cargo.lock library version.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux frontend system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libasound2-dev \
            libudev-dev libx11-dev libxcursor-dev libxrandr-dev libxi-dev
      # Prebuilt binary download instead of `cargo install trunk --locked` (which compiled trunk
      # + its whole dependency tree from source on every single run — minutes of pure setup cost
      # for a tool whose own source never changes here).
      - name: Install trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Build wasm demo
        run: RUSTFLAGS="-C target-feature=-reference-types" trunk build --release --public-url /RustySNES/
        working-directory: crates/rustysnes-frontend/web
      - name: Build rustdoc
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps
      - name: Assemble site
        run: |
          mkdir -p _site/api
          cp -r crates/rustysnes-frontend/web/dist/. _site/
          cp -r target/doc/. _site/api/
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
