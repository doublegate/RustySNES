name: CI
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown, thumbv7em-none-eabihf
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo test --workspace --features test-roms
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps
        if: runner.os == 'Linux'
  no_std:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96
        with:
          targets: thumbv7em-none-eabihf
      - run: cargo build -p rustysnes-core --target thumbv7em-none-eabihf --no-default-features
