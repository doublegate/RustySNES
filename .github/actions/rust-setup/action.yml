name: rust-setup
description: >
  Shared Rust toolchain + cache + Linux frontend system-deps setup, factored out of ci.yml/
  pages.yml so the pinned toolchain version lives in exactly one place (v1.5.0 "Bedrock").

inputs:
  toolchain:
    description: Rust toolchain version to install.
    required: false
    default: "1.96"
  components:
    description: Space/comma-separated rustup components (e.g. "rustfmt, clippy").
    required: false
    default: ""
  targets:
    description: Space/comma-separated cross-compilation targets to install alongside the host.
    required: false
    default: ""
  cache-key-suffix:
    description: Extra Swatinem/rust-cache key segment to keep matrix legs from sharing one cache.
    required: false
    default: ""
  linux-frontend-deps:
    description: >
      Set to "true" to install the X11/Wayland/ALSA dev packages the egui/winit frontend links
      against on Linux (see CONTRIBUTING.md). No-op on non-Linux runners.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    # Pinned to the same `@1.96` ref this repo's workflows already used pre-`v1.5.0` (not
    # `@master`, which floats the ACTION's own implementation and can change CI behavior out from
    # under the pinned Rust toolchain input below without warning — caught in PR review). The
    # `toolchain:` input still wins over whatever default this ref's snapshot implies.
    - uses: dtolnay/rust-toolchain@1.96
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}
    - uses: Swatinem/rust-cache@v2
      with:
        key: ${{ inputs.cache-key-suffix }}
    - name: Install Linux frontend system deps
      if: inputs.linux-frontend-deps == 'true' && runner.os == 'Linux'
      shell: bash
      # Full union of CONTRIBUTING.md's documented Debian/Ubuntu list and every package the
      # pre-`v1.5.0` per-job install steps actually used — `libxkbcommon-x11-dev` was missing here
      # (present in CONTRIBUTING.md but not in the old inline steps this action replaces; caught in
      # PR review) and is needed for X11 builds on Ubuntu runners.
      run: |
        sudo apt-get update
        sudo apt-get install -y libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev \
          libasound2-dev libudev-dev libx11-dev libxcursor-dev libxrandr-dev libxi-dev
